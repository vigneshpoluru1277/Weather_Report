<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyCast - Weather Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">☁ SkyCast</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Forecast</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </div>
</nav>

<div class="app">

  <header class="hero">
    <h1>Real-Time Weather Intelligence</h1>
    <p>Accurate. Fast. Beautiful.</p>
  </header>

  <div class="controls">

    <form class="search" id="searchForm">
      <input id="cityInput"
        type="text"
        placeholder="Search city (e.g., Hyderabad)"
        autocomplete="off" />
      <button class="btn">Search</button>
    </form>

    <div class="toggles">
      <button id="locationBtn" class="btn secondary">📍</button>
      <button id="unitBtn" class="btn secondary">°C</button>
      <button id="themeBtn" class="btn secondary">🌙</button>
    </div>

  </div>

  <div id="loading" class="loader hidden"></div>
  <div id="error" class="error hidden"></div>

  <main class="card hidden" id="card">

    <div class="top">
      <div>
        <div class="place" id="place"></div>
        <div class="time" id="time"></div>
      </div>
      <div class="icon" id="icon">⛅</div>
    </div>

    <div class="tempRow">
      <div class="temp" id="temp"></div>
      <div class="desc" id="desc"></div>
    </div>

    <div class="grid">
      <div class="metric">
        <div>Feels Like</div>
        <div id="feels"></div>
      </div>
      <div class="metric">
        <div>Humidity</div>
        <div id="humidity"></div>
      </div>
      <div class="metric">
        <div>Wind</div>
        <div id="wind"></div>
      </div>
      <div class="metric">
        <div>Sunrise</div>
        <div id="sunrise"></div>
      </div>
      <div class="metric">
        <div>Sunset</div>
        <div id="sunset"></div>
      </div>
    </div>

    <div class="forecast" id="forecast"></div>

  </main>

</div>

<footer class="footer">
  © 2026 SkyCast • Powered by Open-Meteo API
</footer>

<script src="script.js"></script>
</body>
</html>
